<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroClub MX — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0d1a0a;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: #1a2e15; border: 1px solid rgba(82,201,122,.15);
      border-radius: 20px; padding: 40px;
      width: 100%; max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    .login-logo {
      display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
    }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: #52c97a; color: #0a2e14;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem;
    }
    .logo-text h2 { font-size: 1.1rem; font-weight: 800; color: #fff; }
    .logo-text p { font-size: .75rem; color: rgba(255,255,255,.4); }
    .admin-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(249,115,22,.15); border: 1px solid rgba(249,115,22,.3);
      color: #fb923c; font-size: .75rem; font-weight: 700;
      padding: 4px 12px; border-radius: 100px; margin-bottom: 20px;
    }
    h3 { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .sub { font-size: .85rem; color: rgba(255,255,255,.4); margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .75rem; font-weight: 600; color: rgba(255,255,255,.5); margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.06);
      border-radius: 10px; font-size: .9rem;
      font-family: inherit; outline: none; color: #fff;
      transition: border-color .2s;
    }
    input::placeholder { color: rgba(255,255,255,.25); }
    input:focus { border-color: #52c97a; }
    .btn-login {
      width: 100%; padding: 14px;
      background: #1a6b2f; color: #fff;
      border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      margin-top: 8px; transition: background .2s;
    }
    .btn-login:hover { background: #2d9e4f; }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }
    .error-msg {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2);
      color: #f87171; font-size: .82rem; padding: 10px 14px;
      border-radius: 10px; margin-bottom: 16px; display: none;
    }
    .footer-text {
      text-align: center; margin-top: 20px;
      font-size: .75rem; color: rgba(255,255,255,.2);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">AC</div>
      <div class="logo-text">
        <h2>AgroClub MX</h2>
        <p>Panel de administración</p>
      </div>
    </div>
    <div class="admin-badge">🔐 Acceso restringido</div>
    <h3>Hola, Admin 👋</h3>
    <p class="sub">Ingresa tus credenciales para continuar</p>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="admin@agroclub.mx">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')iniciarSesion()">
    </div>
    <button class="btn-login" id="btnLogin" onclick="iniciarSesion()">Entrar al panel →</button>
    <div class="footer-text">Solo personal autorizado de AgroClub MX</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCa6zt7YD3QUzGxyPky0zPPfjQwhtYMeTw",
      authDomain: "agroclub-mx.firebaseapp.com",
      projectId: "agroclub-mx",
      storageBucket: "agroclub-mx.firebasestorage.app",
      messagingSenderId: "231737548143",
      appId: "1:231737548143:web:6651621c2cbad8a31a9c9a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Si ya está logueado como admin, redirigir
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const adminDoc = await getDoc(doc(db, "admins", user.uid));
        if (adminDoc.exists()) {
          window.location.href = "panel.html";
        }
      }
    });

    window.iniciarSesion = async function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("btnLogin");
      const err = document.getElementById("errorMsg");

      if (!email || !password) {
        err.textContent = "Por favor llena todos los campos.";
        err.style.display = "block"; return;
      }

      btn.textContent = "Verificando...";
      btn.disabled = true;
      err.style.display = "none";

      try {
        const result = await signInWithEmailAndPassword(auth, email, password);
        // Verificar que sea admin
        const adminDoc = await getDoc(doc(db, "admins", result.user.uid));
        if (!adminDoc.exists()) {
          err.textContent = "No tienes permisos de administrador.";
          err.style.display = "block";
          btn.textContent = "Entrar al panel →";
          btn.disabled = false;
          return;
        }
        window.location.href = "panel.html";
      } catch (e) {
        btn.textContent = "Entrar al panel →";
        btn.disabled = false;
        err.textContent = "Correo o contraseña incorrectos.";
        err.style.display = "block";
      }
    };
  </script>
</body>
</html>
